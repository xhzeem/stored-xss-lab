events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # PHP upstream - Community Forum / Guestbook / Profile Portal
    upstream php_upstream {
        server php-app:80;
    }

    # Go upstream - Support Desk / Ticketing / Ops Dashboard
    upstream go_upstream {
        server go-app:8080;
    }

    # Java upstream - Internal HR / Applicant Tracking / Employee Portal
    upstream java_upstream {
        server java-app:8080;
    }

    # Node upstream - CMS / Marketing Dashboard / Content Manager
    upstream node_upstream {
        server node-app:3000;
    }

    # Python upstream - Project Management / Notes / Reporting Suite
    upstream python_upstream {
        server python-app:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # NOTE: Intentionally NOT setting X-Content-Type-Options or CSP headers
        # to allow stored XSS payloads to execute for training purposes.

        # Health endpoint for the nginx proxy itself
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Exact-match redirects for /app (no trailing slash) -> /app/
        # Use $http_host to preserve the port from the original request
        location = /php { return 301 $scheme://$http_host/php/; }
        location = /go { return 301 $scheme://$http_host/go/; }
        location = /java { return 301 $scheme://$http_host/java/; }
        location = /node { return 301 $scheme://$http_host/node/; }
        location = /python { return 301 $scheme://$http_host/python/; }

        # PHP app - /php/
        # Strips /php/ prefix, forwards to Apache on port 80
        location /php/ {
            rewrite ^/php/(.*)$ /$1 break;
            proxy_pass http://php_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /php;
            proxy_redirect off;
        }

        # Go app - /go/
        # Strips /go/ prefix, forwards to Gin on port 8080
        location /go/ {
            rewrite ^/go/(.*)$ /$1 break;
            proxy_pass http://go_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /go;
            proxy_redirect off;
        }

        # Java app - /java/
        # Strips /java/ prefix, forwards to Spring Boot on port 8080
        location /java/ {
            rewrite ^/java/(.*)$ /$1 break;
            proxy_pass http://java_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /java;
            proxy_redirect off;
        }

        # Node app - /node/
        # Strips /node/ prefix, forwards to Express on port 3000
        location /node/ {
            rewrite ^/node/(.*)$ /$1 break;
            proxy_pass http://node_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /node;
            proxy_redirect off;
        }

        # Python app - /python/
        # Strips /python/ prefix, forwards to Flask on port 5000
        location /python/ {
            rewrite ^/python/(.*)$ /$1 break;
            proxy_pass http://python_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /python;
            proxy_redirect off;
        }

        # Landing page
        location = / {
            return 200 '<!DOCTYPE html>
<html><head><title>XSS Training Lab</title>
<style>body{font-family:sans-serif;max-width:800px;margin:50px auto;padding:0 20px;}</style>
</head>
<body>
<h1>&#9888; XSS Training Lab</h1>
<p><strong>WARNING:</strong> This is an intentionally vulnerable training environment.
Do NOT expose to the public internet.</p>
<h2>Applications</h2>
<ul>
<li><a href="/php/">PHP - Community Forum / Guestbook</a></li>
<li><a href="/go/">Go - Support Desk / Ticketing</a></li>
<li><a href="/java/">Java - HR Portal / Applicant Tracking</a></li>
<li><a href="/node/">Node.js - CMS / Marketing Dashboard</a></li>
<li><a href="/python/">Python - Project Management / Notes</a></li>
</ul>
<p>All apps use credentials: <code>user/user123</code>, <code>mod/mod123</code>, <code>admin/admin123</code></p>
</body></html>';
            add_header Content-Type text/html;
        }


    }
}
