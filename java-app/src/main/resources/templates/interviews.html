<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal - Interview Notes</title>
    <link rel="stylesheet" th:href="@{${prefix} + '/css/style.css'}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<div class="container">
    <h1>Interview Notes</h1>
    <p>Review and manage interview feedback for candidates.</p>

    <div class="form-container">
        <h2>Add Interview Note</h2>
        <form method="post" th:action="@{${prefix} + '/interviews'}">
            <div class="form-group">
                <label for="applicantId">Applicant ID:</label>
                <input type="number" id="applicantId" name="applicantId" required>
            </div>
            <div class="form-group">
                <label for="interviewer">Interviewer:</label>
                <input type="text" id="interviewer" name="interviewer" required>
            </div>
            <div class="form-group">
                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="rating">Rating (1-5):</label>
                <input type="number" id="rating" name="rating" min="1" max="5" value="3">
            </div>
            <button type="submit" class="btn">Submit Note</button>
        </form>
    </div>

    <h2>Interview Notes List</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Applicant ID</th>
                    <th>Interviewer</th>
                    <th>Notes</th>
                    <th>Rating</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="note : ${notes}">
                    <td th:text="${note.id}"></td>
                    <td th:text="${note.applicantId}"></td>
                    <td th:text="${note.interviewer}"></td>
                    <td th:utext="${note.notes}"></td>
                    <td th:text="${note.rating}"></td>
                    <td th:text="${note.createdAt}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
