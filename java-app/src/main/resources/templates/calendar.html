<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal - Calendar</title>
    <link rel="stylesheet" th:href="@{${prefix} + '/css/style.css'}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<div class="container">
    <h1>Calendar Events</h1>
    <p>View and manage upcoming events and meetings.</p>

    <div class="form-container">
        <h2>Add Event</h2>
        <form method="post" th:action="@{${prefix} + '/calendar'}">
            <div class="form-group">
                <label for="title">Event Title:</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="eventDate">Date:</label>
                <input type="date" id="eventDate" name="eventDate" required>
            </div>
            <div class="form-group">
                <label for="organizer">Organizer:</label>
                <input type="text" id="organizer" name="organizer" required>
            </div>
            <button type="submit" class="btn">Add Event</button>
        </form>
    </div>

    <h2>Upcoming Events</h2>
    <div class="event-list">
        <div class="event-card" th:each="event : ${events}">
            <div class="event-date" th:text="${event.eventDate}"></div>
            <div class="event-details">
                <h3 th:text="${event.title}"></h3>
                <div class="event-description" th:utext="${event.description}"></div>
                <p class="organizer">Organizer: <span th:text="${event.organizer}"></span></p>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
