<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal - Announcements</title>
    <link rel="stylesheet" th:href="@{${prefix} + '/css/style.css'}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<div class="container">
    <h1>Company Announcements</h1>
    <p>Stay updated with the latest company news and announcements.</p>

    <div class="form-container">
        <h2>Post Announcement</h2>
        <form method="post" th:action="@{${prefix} + '/announcements'}">
            <div class="form-group">
                <label for="author">Author:</label>
                <input type="text" id="author" name="author" required>
            </div>
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="content">Content:</label>
                <textarea id="content" name="content" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn">Post Announcement</button>
        </form>
    </div>

    <h2>Recent Announcements</h2>
    <div class="announcement-list">
        <div class="announcement-card" th:each="a : ${announcements}">
            <div class="announcement-header">
                <h3 th:attr="onclick=|showAnnouncement(${a.id}, '${a.title}')|" th:text="${a.title}"></h3>
                <span class="author">By <span th:text="${a.author}"></span></span>
            </div>
            <div class="announcement-content">
                <p th:text="${a.content}"></p>
            </div>
            <p class="date">Posted: <span th:text="${a.createdAt}"></span></p>
        </div>
    </div>
</div>

<script>
function showAnnouncement(id, title) {
    console.log('Viewing announcement: ' + title);
}
</script>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
