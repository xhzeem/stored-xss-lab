<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal - Audit Log</title>
    <link rel="stylesheet" th:href="@{${prefix} + '/css/style.css'}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<div class="container">
    <h1>Audit Log</h1>
    <p>System activity and audit trail for compliance monitoring.</p>

    <div class="form-container">
        <h2>Add Audit Entry</h2>
        <form method="post" th:action="@{${prefix} + '/audit'}">
            <div class="form-group">
                <label for="actor">Actor:</label>
                <input type="text" id="actor" name="actor" required>
            </div>
            <div class="form-group">
                <label for="action">Action:</label>
                <input type="text" id="action" name="action" required>
            </div>
            <div class="form-group">
                <label for="details">Details:</label>
                <textarea id="details" name="details" rows="3"></textarea>
            </div>
            <button type="submit" class="btn">Add Entry</button>
        </form>
    </div>

    <h2>Recent Activity</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Actor</th>
                    <th>Action</th>
                    <th>Details</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="log : ${logs}" th:attr="data-details=${log.details}">
                    <td th:text="${log.id}"></td>
                    <td th:text="${log.actor}"></td>
                    <td th:text="${log.action}"></td>
                    <td th:text="${log.details}"></td>
                    <td th:text="${log.createdAt}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
