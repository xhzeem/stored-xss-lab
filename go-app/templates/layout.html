<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Support Desk</title>
    <link rel="stylesheet" href="{{.Prefix}}/static/style.css">
</head>
<body>
    <nav>
        <a href="{{.Prefix}}/" class="brand">Support<span>Desk</span></a>
        <ul>
            <li><a href="{{.Prefix}}/">Dashboard</a></li>
            <li><a href="{{.Prefix}}/tickets">Tickets</a></li>
            <li><a href="{{.Prefix}}/chat">Chat</a></li>
            <li><a href="{{.Prefix}}/notifications">Notifications</a></li>
            <li><a href="{{.Prefix}}/memos">Memos</a></li>
            <li><a href="{{.Prefix}}/releases">Releases</a></li>
            <li><a href="{{.Prefix}}/csv-import">CSV Import</a></li>
            <li><a href="{{.Prefix}}/search">Searches</a></li>
            <li><a href="{{.Prefix}}/admin">Admin</a></li>
            <li><a href="{{.Prefix}}/help">Help</a></li>
            {{if .LoggedIn}}
            <li><a href="{{.Prefix}}/logout">{{.CurrentUser}} (Logout)</a></li>
            {{else}}
            <li><a href="{{.Prefix}}/login">Login</a></li>
            {{end}}
        </ul>
    </nav>
    <div class="container">
        {{if .Flash}}<div class="card" style="background:#fef3c7;color:#92400e;margin-bottom:1rem;">{{.Flash}}</div>{{end}}
        {{block "content" .}}{{end}}
    </div>
</body>
</html>
