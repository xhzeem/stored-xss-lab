{% extends "base.html" %}
{% block title %}ProjectHub - Calendar{% endblock %}
{% block content %}
<div class="section-header">
    <h1>Calendar Events</h1>
</div>

<div class="card">
    <h2>Add Event</h2>
    <form method="POST">
        <div class="form-inline">
            <div class="form-group" style="flex:2">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Event title" required>
            </div>
            <div class="form-group">
                <label for="event_date">Date</label>
                <input type="date" id="event_date" name="event_date" required>
            </div>
            <div class="form-group">
                <label for="project_id">Project</label>
                <select id="project_id" name="project_id">
                    <option value="">None</option>
                    {% for p in projects %}
                    <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Event details..."></textarea>
        </div>
        <button type="submit" class="btn btn-success">Add Event</button>
    </form>
</div>

<h2>Upcoming Events</h2>
<div class="card">
    {% for e in events %}
    <div class="cal-event">
        <div class="cal-date">{{ e.event_date }}</div>
        <div>
            <h3>{{ e.title }}</h3>
            <div class="wiki-content" style="margin-top:4px">{{ e.description|safe }}</div>
            <p style="margin-top:4px;font-size:0.85em;color:#666">Organizer: {{ e.organizer }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
