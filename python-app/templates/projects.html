{% extends "base.html" %}
{% block title %}ProjectHub - Projects{% endblock %}
{% block content %}
<div class="section-header">
    <h1>Projects</h1>
</div>

<div class="card">
    <h2>Create New Project</h2>
    <form method="POST">
        <div class="form-inline">
            <div class="form-group" style="flex:2">
                <label for="name">Project Name</label>
                <input type="text" id="name" name="name" placeholder="Project name" required>
            </div>
            <div class="form-group" style="flex:3">
                <label for="description">Description</label>
                <input type="text" id="description" name="description" placeholder="Brief description">
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-success">Create</button>
            </div>
        </div>
    </form>
</div>

<h2>All Projects</h2>
<table class="table">
    <thead>
        <tr><th>ID</th><th>Name</th><th>Owner</th><th>Status</th><th>Created</th><th></th></tr>
    </thead>
    <tbody>
        {% for p in projects %}
        <tr>
            <td>{{ p.id }}</td>
            <td><a href="{{ prefix }}/project/{{ p.id }}">{{ p.name }}</a></td>
            <td>{{ p.owner }}</td>
            <td><span class="badge badge-{{ p.status }}">{{ p.status }}</span></td>
            <td>{{ p.created_at }}</td>
            <td><a href="{{ prefix }}/project/{{ p.id }}" class="btn">View</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
