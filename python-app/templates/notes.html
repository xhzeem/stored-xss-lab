{% extends "base.html" %}
{% block title %}ProjectHub - Notes{% endblock %}
{% block content %}
<div class="section-header">
    <h1>Team Notes</h1>
</div>

<div class="card">
    <h2>Create New Note</h2>
    <form method="POST">
        <div class="form-inline">
            <div class="form-group" style="flex:2">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Note title" required>
            </div>
            <div class="form-group" style="flex:1">
                <label for="project_id">Project</label>
                <select id="project_id" name="project_id">
                    <option value="">None</option>
                    {% for p in projects %}
                    <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" placeholder="Write your note here..." required></textarea>
        </div>
        <button type="submit" class="btn btn-success">Add Note</button>
    </form>
</div>

<h2>All Notes</h2>
<div class="grid">
    {% for n in notes %}
    <div class="card">
        <h3>{{ n.title }}</h3>
        <div class="wiki-content" style="margin-top:6px">{{ n.content|safe }}</div>
        <p style="margin-top:8px;font-size:0.85em;color:#666">By {{ n.author }} | {{ n.created_at }}</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
