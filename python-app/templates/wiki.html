{% extends "base.html" %}
{% block title %}ProjectHub - Wiki{% endblock %}
{% block content %}
<div class="section-header">
    <h1>Project Wiki</h1>
</div>

<div class="card">
    <h2>Create Wiki Page</h2>
    <form method="POST">
        <div class="form-inline">
            <div class="form-group" style="flex:2">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Page title" required>
            </div>
            <div class="form-group" style="flex:1">
                <label for="project_id">Project</label>
                <select id="project_id" name="project_id">
                    <option value="">None</option>
                    {% for p in projects %}
                    <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" placeholder="Wiki content..." required></textarea>
        </div>
        <button type="submit" class="btn btn-success">Create Page</button>
    </form>
</div>

<h2>All Wiki Pages</h2>
<div class="grid">
    {% for page in pages %}
    <div class="card wiki-content">
        <h3>{{ page.title }}</h3>
        <div style="margin-top:6px">{{ page.content }}</div>
        <p style="margin-top:8px;font-size:0.85em;color:#666">By {{ page.author }} | {{ page.created_at }}</p>
    </div>
    {% endfor %}
</div>

<script>
var wikiPages = {{ json_data|safe }};
</script>
{% endblock %}
